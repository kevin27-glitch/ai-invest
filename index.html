<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI投资分析对比</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
<div class="max-w-3xl mx-auto mt-8">
<h1 class="text-2xl font-bold text-center mb-1">AI投资分析对比</h1>
<p class="text-center text-gray-500 mb-6">Grok · DeepSeek 双模型校准</p>

<div class="bg-white p-5 rounded-xl shadow">
<input id="stock" placeholder="例如 TSLA 3690.HK 9618.HK" class="w-full p-3 border rounded mb-4"/>
<button onclick="run()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">开始分析</button>
</div>

<div id="loading" class="hidden text-center my-4">正在调用 AI…</div>
<div id="result" class="hidden mt-6 space-y-4"></div>
</div>

<script>
async function run() {
const stock = document.getElementById('stock').value.trim();
if (!stock) return alert('请输入股票');
document.getElementById('loading').classList.remove('hidden');
document.getElementById('result').classList.add('hidden');

const resp = await fetch('/api/analyze', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ stock })
});

const data = await resp.json();
show(data);
document.getElementById('loading').classList.add('hidden');
}

function show(data) {
const r = document.getElementById('result');
r.classList.remove('hidden');
r.innerHTML = `
<div class="bg-white p-4 rounded-xl shadow">
<div class="font-bold text-lg">${data.stock}</div>
</div>

<div class="grid md:grid-cols-2 gap-3">
<div class="bg-white p-4 rounded-xl shadow">
<div class="font-bold text-blue-600 mb-2">Grok</div>
<div class="text-sm">${data.grok}</div>
</div>
<div class="bg-white p-4 rounded-xl shadow">
<div class="font-bold text-purple-600 mb-2">DeepSeek</div>
<div class="text-sm">${data.deepseek}</div>
</div>
</div>

<div class="bg-blue-50 p-4 rounded-xl shadow">
<div class="font-bold">📊 综合校准结论</div>
<div>${data.summary}</div>
</div>

<div class="bg-yellow-50 p-4 rounded-xl shadow">
<div class="font-bold">⚠️ 风险提示</div>
<div>AI分析仅供参考，不构成投资建议，市场有风险，投资需谨慎。</div>
</div>
`;
}
</script>
</body>
</html>
